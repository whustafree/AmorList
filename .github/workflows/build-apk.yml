name: Build AmorList APK

on:
  push:
    branches: [main]
    paths:
      - 'amorlist-vue/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: amorlist-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: amorlist-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Android SDK & Java
        run: |
          echo "=== JAVA_HOME ==="
          echo "JAVA_HOME=$JAVA_HOME"
          java -version 2>&1
          echo ""
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if [ -z "$ANDROID_HOME" ]; then
            # Fallback: buscar SDK en ubicaciones comunes
            for dir in /usr/local/lib/android/sdk /opt/android-sdk $HOME/Android/Sdk; do
              if [ -d "$dir" ]; then
                echo "ANDROID_HOME=$dir" >> $GITHUB_ENV
                echo "ANDROID_SDK_ROOT=$dir" >> $GITHUB_ENV
                echo "Usando SDK en: $dir"
                break
              fi
            done
          fi
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir yet"

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5 || echo 'SDK ya instalado'
          ls $ANDROID_HOME/platforms/android-36/ 2>/dev/null && echo 'SDK 36 OK' || echo 'SDK 36 NO INSTALADO'

      - name: Build web app
        env:
          VITE_API_URL: https://amorlist-94u2.onrender.com
        run: npm run build

      - name: Sync Capacitor (manual)
        run: |
          echo "=== Copiando web assets a Android ==="
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/
          echo "✅ Sync completado"

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          # Asegurar local.properties con SDK real
          echo "sdk.dir=${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}" > local.properties
          cat local.properties
          echo "=== Build debug APK ==="
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Build release AAB
        if: ${{ false }}  # Deshabilitado hasta que tengamos keystore
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace 2>&1

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name=AmorList-v$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK/AAB
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "AmorList-v${VERSION}-debug.apk"
          fi
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "AmorList-v${VERSION}-release-unsigned.apk"
          fi
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab "AmorList-v${VERSION}.aab"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AmorList-v${{ steps.version.outputs.version }}
          path: amorlist-vue/AmorList-v*
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: AmorList v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}-build-${{ github.run_number }}
          files: |
            amorlist-vue/AmorList-v*
          generate_release_notes: true
