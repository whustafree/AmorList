name: Build AmorList APK

on:
  push:
    branches: [main]
    paths:
      - 'amorlist-vue/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: amorlist-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: amorlist-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name=AmorList-v$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK/AAB
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "AmorList-v${VERSION}-debug.apk"
          fi
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "AmorList-v${VERSION}-release-unsigned.apk"
          fi
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab "AmorList-v${VERSION}.aab"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AmorList-v${{ steps.version.outputs.version }}
          path: amorlist-vue/AmorList-v*
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: AmorList v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}-build-${{ github.run_number }}
          files: |
            amorlist-vue/AmorList-v*
          generate_release_notes: true
