name: Build AmorList APK

on:
  push:
    branches: [main]
    paths:
      - 'amorlist-vue/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: amorlist-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: amorlist-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          
          echo "=== Java ==="
          java -version 2>&1
          echo "JAVA_HOME=$JAVA_HOME"
          
          echo "=== Android SDK ==="
          ls -la $ANDROID_SDK/ 2>&1 || echo "SDK NOT FOUND in $ANDROID_SDK"
          
          # Buscar SDK en ubicaciones alternativas si no existe
          if [ ! -d "$ANDROID_SDK" ]; then
            for dir in /opt/android-sdk $HOME/android/sdk $HOME/Android/Sdk; do
              if [ -d "$dir" ]; then
                echo "SDK encontrado en: $dir"
                ANDROID_SDK=$dir
                echo "ANDROID_HOME=$dir" >> $GITHUB_ENV
                echo "ANDROID_SDK_ROOT=$dir" >> $GITHUB_ENV
                break
              fi
            done
          fi
          
          echo "=== SDK Manager ==="
          SDKMAN=$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager
          if [ -f "$SDKMAN" ]; then
            echo "sdkmanager encontrado"
          else
            # Buscar sdkmanager
            SDKMAN=$(find $ANDROID_SDK -name sdkmanager -type f 2>/dev/null | head -1)
            echo "sdkmanager encontrado en: $SDKMAN"
          fi
          
          # Instalar SDK 36 si no existe
          if [ ! -d "$ANDROID_SDK/platforms/android-36" ]; then
            echo "Instalando Android SDK 36..."
            yes | $SDKMAN "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -10
            echo "SDK 36 instalado: $(ls $ANDROID_SDK/platforms/ 2>&1)"
          else
            echo "SDK 36 ya instalado"
          fi

      - name: Build web app
        env:
          VITE_API_URL: https://amorlist-94u2.onrender.com
        run: npm run build

      - name: Sync Capacitor
        run: |
          echo "=== Sincronizando Capacitor (genera plugins nativos) ==="
          npx cap sync android 2>&1
          echo "✅ Sync completado"

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          echo "sdk.dir=${ANDROID_HOME:-/usr/local/lib/android/sdk}" > local.properties
          echo "=== Build debug APK === (JAVA_HOME=${JAVA_HOME})"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name=AmorList-v$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_PATH=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" "AmorList-v${VERSION}-debug.apk"
            echo "✅ APK generado: AmorList-v${VERSION}-debug.apk"
            ls -lh "AmorList-v${VERSION}-debug.apk"
          else
            echo "❌ app-debug.apk no encontrado"
            find android -name "*.apk" 2>/dev/null
            find android -name "*.log" 2>/dev/null | head -5
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AmorList-v${{ steps.version.outputs.version }}
          path: amorlist-vue/AmorList-v*
          if-no-files-found: error
